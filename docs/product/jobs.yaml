# Product Jobs Register — InkSwift
# Seed created by: story-testability DISCUSS wave (2026-06-10)
# Maintainer: nw-product-owner
# Format: Jobs-to-Be-Done (JTBD) job statements

schema_version: 4

changelog:
  - version: 4
    date: "2026-07-16"
    feature: "native-runtime-migration"
    note: >
      Added job-runtime-consolidation (DISCUSS wave): the existing InkSwift JS-bridge
      (v2.x) consumer's job of confidently switching onto the one recommended native
      runtime. This is the "nudge" increment — reposition the README, deprecate the
      JS-bridge InkStory API with a v3.0.0-removal signal, ship an InkStory→Story/
      InkCompiler migration guide, and publish an honest supported-parity / known-gaps
      statement. It composes with (and is made possible by) job-story-playback,
      job-native-compilation, and job-linux-portability, which made the native runtime
      ready on Apple + Linux. Scope EXCLUDES actually removing the JS-bridge product;
      the eventual removal is a separate future feature (breaking major, v3.0.0). This
      sets a course toward removal that CONTRADICTS native-runtime-linux's recorded
      "keep the JS-bridge" decision — see the feature-delta ## Changed Assumptions
      section (deprecate-now / remove-in-v3.0.0-later). The evolution doc is unchanged.
  - version: 3
    date: "2026-07-15"
    feature: "native-runtime-linux"
    note: >
      Added job-linux-portability (DISCUSS wave) and a NEW persona Nadia — a
      server-side Swift / CI-focused developer running Ink on Linux, distinct from
      the Apple-platform persona Maarten. The job extends the reach of
      job-story-playback (RUN side) and job-native-compilation (BUILD side) onto
      Linux without changing what the runtime or compiler do. Scope excludes the
      legacy InkSwift JS-bridge module (Apple-only by construction).
  - version: 2
    date: "2026-06-22"
    feature: "state-blueprint-compatibility"
    note: >
      Added job-state-durability (DIVERGE wave): preserving per-player saved state as the
      shared Ink blueprint evolves. DIVERGE recommends a compile-time blueprint identity
      stamp + loud restore guard, composing with a tolerant best-effort restore result.
  - version: 1
    date: "2026-06-10"
    feature: "story-testability"
    note: "Seeded the jobs register (story-testability DISCUSS wave)."

jobs:
  - id: "job-story-logic-verification"
    status: "active"
    persona: "Raya — Swift developer and Ink story author"
    statement: >
      When I have written an Ink story with branching logic,
      I want to verify that specific narrative branches behave correctly for given variable states,
      so I can ship the story with confidence that the logic matches my intent
      and catch regressions when I edit the story.
    features:
      - id: "story-testability"
        contribution: "Adds getVariable, setVariable, visitCount, setVisitCount, continueMaximally to Story facade — enables GWT unit tests for individual story branches"
        status: "in DESIGN wave"
      - id: "native-move-to-knot"
        contribution: "Adds moveToKnot to Story facade — enables direct navigation to any named knot without choice-replay"
        status: "delivered (archived)"
    outcome_kpis:
      - "Story authors write ≥1 variable-assertion test per branching knot"
      - "Tests survive choice-reordering story edits without modification"
      - "continueMaximally eliminates while-loop boilerplate from WHEN steps"

  - id: "job-story-playback"
    status: "active"
    persona: "Maarten — Swift app developer embedding Ink stories"
    statement: >
      When I am building a Swift app or game that tells Ink stories,
      I want a pure-Swift runtime that executes the full Ink specification,
      so I can ship on any Apple platform without a JavaScript engine dependency.
    features:
      - id: "native-runtime"
        contribution: "SwiftInkRuntime module: pure-Swift tree-walker engine executing Ink JSON; supports CORE, STANDARD, and ADVANCED features up to The Intercept ceiling"
        status: "delivered (archived)"
    outcome_kpis:
      - "SwiftInkRuntime executes The Intercept (28 knots, 47 stitches, 21 variables) line-for-line identical to inkjs oracle"
      - "No JavaScript engine dependency in production builds"

  - id: "job-native-compilation"
    status: "active"
    persona: "Maarten — Swift app developer embedding Ink stories"
    related_jobs:
      - id: "job-story-playback"
        relationship: >
          Completes the toolchain that job-story-playback started. Playback removed
          the JavaScript engine from the RUN side; native compilation removes the
          external inklecate binary from the BUILD side. Together they make the whole
          Ink pipeline pure-Swift, end to end.
    statement: >
      When I author an Ink story for my Swift app and need to turn it into something
      my app can play, I want to compile it to a runnable story entirely within my
      Swift toolchain, so I can build and ship without depending on the external
      inklecate binary — and get a clear error the moment I use a feature my runtime
      cannot play, instead of shipping a silently broken story.
    forces:
      push: >
        The runtime is already pure Swift, but every build still shells out to the
        external inklecate (C#) binary to compile .ink to .ink.json. That binary must
        be installed, version-matched, and invoked out-of-process on every machine and
        CI runner.
      pull: >
        One Swift toolchain that both compiles and runs Ink. In-process compilation,
        no external binary, and a compiled story object the runtime can consume directly.
      anxiety: >
        A hand-written Swift compiler might produce output that diverges silently from
        inklecate, or might accept an unsupported feature and emit a subtly wrong story.
      habit: >
        An established "inklecate file.ink -o file.ink.json" build step, and trust in
        inklecate as the ground truth.
    features:
      - id: "native-ink-compiler"
        contribution: >
          Native Swift compiler: reads .ink source, produces an in-memory story the
          SwiftInkRuntime Story can play directly; scope bounded to the runtime's
          supported feature set; rejects unsupported Ink constructs with a clear,
          located error naming the construct; ships a supported/unsupported feature
          reference document; oracle-validated against inklecate execution equivalence.
        status: "in DISCUSS wave"
      - id: "compiler-variable-text"
        contribution: >
          Adds a lowering pass that compiles Ink's deterministic variable-text forms —
          sequence {a|b|c} (row 25), cycle {&a|b} (row 26), and once-only {!a|b} / {|x|}
          (row 27) — into the read-count-driven visit-count switch the SwiftInkRuntime
          engine already executes. Moves rows 25-27 from MUST-REJECT to MUST-COMPILE,
          closing the documented compiler/runtime parity gap with zero runtime changes,
          and re-enables the descoped TheIntercept.ink native-compile end-to-end test.
          Shuffle {~a|b} (row 28) stays MUST-REJECT (additionally needs RANDOM).
          Follow-on increment to native-ink-compiler; reuses persona Maarten.
        status: "in DISCUSS wave"
    outcome_kpis:
      - "Stories within the supported feature set compile in-process and play line-for-line identically to the inklecate-compiled equivalent (execution-equivalence oracle)"
      - "Every unsupported Ink construct produces a clear, located compile error naming the construct — zero silent wrong output"
      - "A published supported/unsupported feature reference lets authors stay inside the supported set without trial and error"
      - "No dependency on the external inklecate binary for compiling supported stories"

  - id: "job-state-durability"
    status: "active"
    persona: "Maarten — Swift app developer embedding Ink stories"
    related_jobs:
      - id: "job-story-playback"
        relationship: >
          Playback persists per-player StoryState against a shared blueprint. This job
          owns what happens to that state when the blueprint itself evolves post-release.
    statement: >
      When I have shipped an Ink-driven game whose blueprint I must keep editing while
      players hold long-lived saves, I want each player's accumulated narrative state to
      remain restorable against the evolving blueprint — or to be told unambiguously when
      it cannot be — so I can patch the story without silently corrupting or discarding
      player progress.
    forces:
      push: >
        Saved StoryState couples to the blueprint via variable names, dot-joined container
        paths, and positional index path-components; no identity stamp exists, and a stale
        path silently degrades to root (navigateAbsolute(...) ?? root) — drift surfaces only
        as a runtime restore failure seen first by the player.
      pull: >
        Edit a published story safely: detect blueprint/save drift before shipping or loudly
        at restore, and recover as much player progress as possible.
    features:
      - id: "state-blueprint-compatibility"
        contribution: >
          DIVERGE recommends a two-track direction: (Detect) a CI/CD blueprint-compatibility
          check — D-1 content-hash warning of last-shipped vs new blueprint, then D-2 a
          structure-relevant diff reporting only save-breaking changes — plus (Remediate) a
          tolerant runtime restore returning an explicit RestoreResult (replacing the silent
          root fallback). A runtime identity-hash guard is folded into D-1 + the restore
          result rather than shipped standalone. Pending DISCUSS convergence.
        status: "in DIVERGE wave"
    outcome_kpis:
      - "A blueprint/save mismatch is detected and reported (never silently degraded to root)"
      - "A restore against an edited blueprint reports which state survived and which was dropped"
      - "Save-breaking blueprint changes are surfaced to the developer before reaching a player"

  - id: "job-linux-portability"
    status: "active"
    persona: "Nadia — server-side Swift developer running Ink on Linux"
    persona_file: "docs/product/personas/nadia.md"
    related_jobs:
      - id: "job-story-playback"
        relationship: >
          job-story-playback made playback pure-Swift so it could run on any Apple
          platform without a JavaScript engine. This job extends that SAME runtime's
          correct-execution reach to Linux — same engine, new platform and audience
          (server-side / CI). It does not change what the runtime does, only where it
          runs identically.
      - id: "job-native-compilation"
        relationship: >
          job-native-compilation removed the external inklecate binary from the BUILD
          side for Apple developers. This job carries that pure-Swift compile+run
          toolchain onto Linux, where installing a separate compiler binary is even
          more awkward (containers, CI runners). Extends reach, does not change the
          compiler's behaviour.
    statement: >
      When I run Swift services and CI on Linux and want to embed Ink stories
      server-side, I want the pure-Swift Ink runtime and compiler to build, test,
      and play identically on Linux as they do on macOS, so I can ship Ink-driven
      backends and run the whole test suite in my Linux CI without needing a Mac or
      a JavaScript engine.
    forces:
      push: >
        SwiftInkRuntime is pure Swift but does not build/behave correctly on Linux.
        InkDecoder.classifyNumber relies on CoreFoundation identity
        (CFGetTypeID/CFBooleanGetTypeID + CFNumberGetType); under
        swift-corelibs-foundation's JSONSerialization on Linux, NSNumber's CF type
        identity is unreliable, so bool-vs-int and int-vs-float classification can
        silently diverge from macOS. There is no Linux CI job, and no macOS-only
        JS-bridge oracle to compare against on Linux.
      pull: >
        One codebase that builds, tests green, and plays/compiles Ink identically on
        Linux and macOS; a committed-fixture oracle that verifies parity without the
        macOS-only JS-bridge; and Linux CI that guards that parity on every push.
      anxiety: >
        "Will number/bool classification silently diverge on Linux — a 2.5 read as 2,
        or true read as 1 — so a story plays differently than on my Mac, a
        platform-specific correctness bug I can't see locally? And without the
        JS-bridge oracle on Linux, how do I trust the committed expected outputs are
        actually correct?"
      habit: >
        Develops and tests on macOS, trusting "it works on my Mac" and the live
        JS-bridge oracle. CI runs only macOS-arm64.
    opportunity_score:
      importance: 9
      satisfaction: 2
      score: 16      # importance + max(importance - satisfaction, 0) = 9 + (9-2)
      band: "extreme (>15) — underserved, high-value; the runtime literally does not run for this persona today"
    features:
      - id: "native-runtime-linux"
        contribution: >
          Makes SwiftInkRuntime + SwiftInkRuntimeTestSupport build, test, and run on
          Linux: portable number/bool classification that reproduces macOS
          int/float/bool tagging, Linux-safe resource loading, a committed-fixture
          oracle replacing the macOS-only JS-bridge comparison, and a Linux swift-test
          CI job. Scope excludes the legacy InkSwift JS-bridge module (Apple-only by
          construction; already conditionalized to .macOS in Package.swift).
        status: "in DISCUSS wave"
    outcome_kpis:
      - "SwiftInkRuntime + SwiftInkRuntimeTestSupport build and the full test suite passes on Linux (0% → 100%)"
      - "Every supported story in the committed fixture corpus plays line-for-line / choice-for-choice identical on Linux and macOS"
      - "Zero int/float/bool/bool-vs-int misclassifications on Linux across the fixture corpus"
      - "A Linux swift-test CI job runs on every push, catching Linux parity regressions before merge"

  - id: "job-runtime-consolidation"
    status: "active"
    persona: "Maarten — Swift app developer embedding Ink stories (existing InkSwift JS-bridge v2.x consumer); secondarily Nadia — server-side Swift developer on Linux"
    persona_file: "docs/product/personas/maarten.md"
    related_jobs:
      - id: "job-story-playback"
        relationship: >
          job-story-playback made the RUN side pure-Swift (native runtime, no JS
          engine). This job helps the consumer who is still on the JS-bridge actually
          adopt that runtime and understand the JS-bridge is now the legacy path.
      - id: "job-native-compilation"
        relationship: >
          job-native-compilation made the BUILD side pure-Swift (native compiler, no
          external inklecate). Together with playback it made a single native runtime
          viable; this job signals consolidation onto it and maps the API to switch.
      - id: "job-linux-portability"
        relationship: >
          job-linux-portability extended the native runtime's correct-execution reach
          to Linux, making "one recommended runtime for every platform" credible — the
          precondition for nudging all consumers (Apple AND Linux) toward it.
    statement: >
      When I have an app or service built on the InkSwift JS-bridge (v2.x) and the
      maintainer is steering toward one native runtime, I want to understand that the
      JS-bridge is now legacy, see exactly how my code maps to the native
      SwiftInkRuntime API, and know honestly what does and does not work yet, so I can
      decide whether and how to migrate — without being surprised by a future breaking
      removal or misled by an over-claimed "full parity".
    forces:
      push: >
        The JS-bridge carries a JavaScriptCore/JXKit + bundled inkjs dependency, and
        the README still markets it as primary while calling the native runtime
        "experimental". The maintainer wants to consolidate on one runtime and reduce
        maintenance burden (drop the JavaScriptCore system-lib dependency).
      pull: >
        One recommended pure-Swift runtime with no JS engine; a clear InkStory →
        Story/InkCompiler API mapping; an honest supported-parity / known-gaps
        statement; and advance notice of the eventual v3.0.0 removal so migration can
        be planned, not forced.
      anxiety: >
        "If I migrate, will my story behave identically? The native runtime cannot play
        LIST, RANDOM/SEED_RANDOM, threads, EXTERNAL functions, or shuffle {~a|b}, and
        it has no Combine reactive observation — will I silently lose features?" and
        "Will the JS-bridge vanish from under me without warning?"
      habit: >
        The established InkStory() + loadStory + Combine ObservableObject/@StateObject
        SwiftUI pattern the README teaches; trust in inkjs (full Ink) as ground truth.
    features:
      - id: "native-runtime-migration"
        contribution: >
          The "nudge" increment. (1) Repositions the README so the native
          SwiftInkRuntime is the recommended runtime for new projects (honest framing,
          not over-claimed parity). (2) Adds an @available deprecation signal on the
          JS-bridge InkStory public API whose warning names the v3.0.0 removal and
          points to the native runtime + migration guide. (3) Ships a migration guide
          mapping every InkStory call to its Story/InkCompiler equivalent (including
          the no-equivalent Combine-observation gap). (4) Publishes an honest
          supported-parity / known-gaps statement. Scope EXCLUDES removing or
          repurposing the JS-bridge product — that is a separate future feature
          (breaking major, v3.0.0).
        status: "in DISCUSS wave"
    outcome_kpis:
      - "An existing JS-bridge consumer who rebuilds sees a deprecation warning that names v3.0.0 and links to a resolvable migration guide (0 → 100% of consumers compiling InkStory)"
      - "The migration guide maps 100% of the InkStory public API to a native equivalent or an explicit 'no native equivalent' (Combine observation)"
      - "The published known-gaps list names 100% of documented feature gaps (LIST, RANDOM, threads, EXTERNAL, shuffle) and API gaps (Combine observation, tag-shape, error-handling)"
      - "The deprecation signal is a warning, not an error: 0 existing consumer builds break; macOS + Linux suites stay green; no public API removed"
