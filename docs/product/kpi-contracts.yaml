# KPI Contracts — InkSwift (SSOT)
#
# The library analog of dashboards/alerts. For each outcome KPI, this maps the
# KPI to its CI instrument: the data source, the collecting test/check, the pass
# threshold, and the failure/guardrail semantics. There is NO runtime telemetry
# (this is a library, not a service) — every KPI is a CI gate (a test assertion).
#
# Owner: Apex (nw-platform-architect). Created: 2026-06-14 (DEVOPS wave).

version: 1
project: InkSwift

features:
  native-ink-compiler:
    north_star:
      description: >
        % of supported-corpus stories that compile in-process and play
        line-for-line identical to the inklecate oracle.
      target: 100%
      instrument: kpi-1
    kpis:
      - id: kpi-1
        name: Oracle execution-equivalence
        type: leading
        who: developer with a supported story
        does_what: compiles + plays it in-process, oracle-identical
        ci_data_source: >
          .ink source corpus compiled NATIVELY vs the committed inklecate .ink.json
          oracle, both played through the pure-Swift Story runtime along the same
          choice script. This comparison imports no InkSwift, so it is hermetic and
          cross-platform — PRIMARY gate runs on env: clean (macOS + linux). The
          macOS InkSwift JS-bridge is a SECONDARY ground-truth cross-check
          (env: with-oracle-macos). [DISTILL UI-1, 2026-06-14]
        collecting_check: execution-equivalence oracle test suite (per-slice + TheIntercept end-to-end)
        pass_threshold: 100% of supported-corpus stories play line-for-line / choice-for-choice identical
        guardrail_semantics: >
          any divergent line or choice fails CI (blocking). This is the North-Star
          gate; a regression here blocks merge.
        baseline: 0% (inklecate required for all compilation today)

      - id: kpi-2
        name: Unsupported-construct rejection
        type: leading
        who: developer using an unsupported construct
        does_what: gets a clear located error, not a broken story
        ci_data_source: unsupported-construct corpus (one construct per fixture; rows 25-28, 36-39)
        collecting_check: unsupported-construct corpus test asserting named + located error and NO story produced
        pass_threshold: 100% rejected with a named, located error
        guardrail_semantics: >
          HARD GUARDRAIL — 0% silent wrong output. If any unsupported construct
          compiles to a story (silently), CI fails. This must never regress; it is
          the defining safety property of the feature (D2).
        baseline: n/a (native path absent today)

      - id: kpi-3
        name: Doc-vs-compiler consistency
        type: leading
        who: author planning a story
        does_what: predicts compile/reject from the reference document
        ci_data_source: supported/unsupported feature reference document (US-07) + actual compiler behaviour
        collecting_check: doc-vs-compiler consistency test iterating the reference construct list
        pass_threshold: 100% of constructs documented; every documented status matches compiler behaviour
        guardrail_semantics: >
          a documented status that disagrees with the compiler fails CI (blocking).
          Keeps the reference truthful as the compiler evolves.
        baseline: no reference exists today

      - id: kpi-4
        name: No-inklecate guardrail
        type: leading
        who: the developer's build
        does_what: compiles supported stories without inklecate
        ci_data_source: production Compiler/ source + compile-path process behaviour
        collecting_check: >
          no-inklecate guardrail — (a) a build-time source guard asserting production
          Compiler/ code references no Process / inklecate symbol, and (b) a test that
          fails if an inklecate subprocess is spawned during native compilation
        pass_threshold: 0 inklecate invocations for supported builds
        guardrail_semantics: >
          any reference to Process/inklecate in production Compiler/ code, or any
          inklecate subprocess spawned during a supported compile, fails CI (blocking).
          inklecate remains test-only/offline for fixture generation only.
        baseline: every build invokes inklecate today

    measured_baselines:
      # Recorded at DELIVER of slices S0–S2 (2026-06-14). Reference point for future deltas.
      as_of: 2026-06-14
      scope: slices S0, S1, S2 (of S0–S6)
      kpi-1: >
        100% of the in-scope supported corpus (compile-skeleton-hello, compile-linear-flow,
        compile-variables) compiles natively in-process and plays line-for-line identical to
        the committed inklecate .ink.json oracle. Full supported corpus (S3–S6 incl. TheIntercept
        end-to-end) pending future slices.
      kpi-4: >
        0 inklecate invocations — production Compiler/ references no Process/inklecate symbol
        (source guard) and spawns no subprocess during native compile (test-verified).
      kpi-2: not yet measured (S6 unsupported-rejection corpus — future slice)
      kpi-3: not yet measured (S5 doc-vs-compiler consistency — future slice)

    measured_baselines_compiler_variable_text:
      # Recorded at GA of the compiler-variable-text feature (2026-06-15). Delta on top of
      # the native-ink-compiler S0–S6 baselines above. Full swift test: 290 tests, 0 failures.
      as_of: 2026-06-15
      scope: deterministic variable-text lowering (matrix rows 25–27) + the `not` unary operator
      kpi-1: >
        The three deterministic variable-text forms — sequence {a|b|c} (row 25), cycle {&a|b} (26),
        once-only {!a|b} / bare {|x|} (27) — now compile NATIVELY in-process and play line-for-line /
        choice-for-choice identical to the committed inklecate .ink.json oracle (VariableTextEmitter,
        #f:5 visit-switch; zero runtime change). The `not` unary operator also compiles (step 05-01).
        HOWEVER the full TheIntercept.ink native-compile end-to-end (the north-star ceiling fixture)
        is STILL NOT GREEN — it remains blocked, and its e2e oracle test is .disabled. The blocker is
        no longer variable text (line 86 now compiles): an honest slice-04 RED falsified the
        sole-blocker premise and surfaced a remaining gap — dotted read-count addressing of named
        weave labels — which needs a weave-label addressing subsystem DEFERRED (user-approved) to the
        native-ink-compiler feature. So: supported-corpus variable-text coverage is at 100% oracle
        parity; TheIntercept full e2e north-star is NOT yet met, by the deferred weave-label gap.
      kpi-2: >
        variable-text shuffle {~a|b} (row 28) stays rejected with a named, located
        .unsupportedConstruct error (UnsupportedConstructDetector narrowed to shuffle-only;
        regression-guarded each slice). No silent wrong output. Rows 36–39 unchanged.
      kpi-4: >
        0 inklecate invocations — the variable-text lowering is a compiler-only diff; production
        Compiler/ still references no Process/inklecate symbol and spawns no subprocess (holds).

    measured_baselines_weave_label_read_count:
      # Recorded at finalize of the native-ink-compiler weave-label read-count addressing slice
      # (2026-06-15, ADR-011 Option B, commits db4bcef..c47b2a0, 5 steps). Delta on top of the
      # compiler-variable-text baselines above. Full swift test: 323 tests, 0 failures.
      as_of: 2026-06-15
      scope: read-count addressing subsystem — dotted read-count references to named weave labels AND named knots/stitches
      kpi-1: >
        Dotted read-count addressing has LANDED: a dotted read-count reference to a named weave label
        (knot.choice-label) OR a named knot/stitch now lowers to a runtime .readCount(resolvedPath) node
        (parser dotted-identifier acceptance + WeaveEmitter label-keyed containers + targeted 0x1 CountVisits
        flag + weaveLabelPaths table + lowerExpression .readCount emission). The dotted read-count RED-pin AT
        (a dotted read-count reference to a named stitch lowers to a read-count node) is GREEN. Zero
        runtime/Engine/Decoder change (R1/R3/R5 + WL-D7 held).
        HOWEVER the flagship TheIntercept.ink full native-compile end-to-end (the north-star ceiling fixture)
        is STILL NOT GREEN and its e2e oracle test REMAINS .disabled — DO NOT claim it green. The blocker is
        no longer the weave-label gap (that shipped this slice): closing the e2e was found to require a THIRD
        subsystem beyond ADR-011 — variable-text {|...|} at a gather-lead position threading back into the
        gather's nested choices (VariableTextEmitter + gather-lead continuation threading) — plus further
        unknown blockers past line 86 of TheIntercept.ink. Per user decision (2026-06-15) this is a
        multi-subsystem FOLLOW-UP to be designed afresh as an alternative closure strategy, not chased
        per-blocker. So: read-count-addressing supported-corpus coverage is at oracle parity; the TheIntercept
        full e2e north-star (kpi-1 ceiling) is NOT yet met — it remains DEFERRED by the gather-lead
        variable-text gap.
      kpi-2: >
        unchanged — unsupported-construct rejection holds; this slice added no new constructs to the
        supported or rejected set (it addresses read-counts of already-supported named targets).
      kpi-4: >
        0 inklecate invocations — the read-count addressing diff is Compiler/-only; production Compiler/
        still references no Process/inklecate symbol and spawns no subprocess (holds).

    measured_baselines_emission_alignment:
      # Recorded at finalize of the native-compiler-emission-alignment feature (2026-06-16).
      # 15 probe-driven increments on `main` (commits 4686262..5d3b27e), Compiler/ only, runtime
      # REUSE-AS-IS. Full swift test: 334 tests, 0 failures. DES integrity 15/15 (exit 0).
      as_of: 2026-06-16
      scope: TheIntercept.ink full-story native-compile execution-equivalence (the north-star ceiling fixture)
      kpi-1: >
        MET. KPI #1's north-star ceiling — the flagship `TheIntercept.ink` full native-compile
        end-to-end — is now ACHIEVED (previously DEFERRED across compiler-variable-text and the
        weave-label slice). Native compiles TheIntercept and plays line-for-line / choice-for-choice
        identical to the committed inklecate .ink.json oracle for all 80 lines along the fixed choice
        script. The e2e oracle AT is RE-ENABLED and GREEN; zero `.disabled` ATs remain (the waived
        finalize invariant is discharged). Closed by ~17 GENERAL compiler fixes (#3b variable-text/
        weave continuation threading, #4a implicit read-count coverage, #4b nested choice-label
        read-counts), gated by the DIAG_INTERCEPT2 real-story playback probe + a ratchet AT — NOT by
        story-specific patches. The cosmetic divergence classes (#1/#2/#3a) remained D5-licensed
        (untouched, confirmed harmless by the green e2e). With this, the supported-corpus North-Star
        (% of supported-corpus stories compiling oracle-identical) reaches 100% including the ceiling
        fixture.
      kpi-2: >
        unchanged — unsupported-construct rejection holds; this feature added no new constructs to the
        supported or rejected set (it is emission-alignment of already-supported constructs).
      kpi-4: >
        0 inklecate invocations — the emission-alignment diff is Compiler/-only; production Compiler/
        still references no Process/inklecate symbol and spawns no subprocess (holds).

    monitoring_model:
      runtime_telemetry: none           # library, not a service — no dashboards/alerts at runtime
      instrument_kind: ci-test-gate     # every KPI is a CI assertion
      cadence: per CI run (every push / pull_request)
      environment: clean                 # PRIMARY: KPI #1 hermetic native-vs-inklecate-fixture + #2/#3/#4 all run cross-platform on clean. with-oracle-macos adds the secondary JS-bridge cross-check for KPI #1 [DISTILL UI-1]
