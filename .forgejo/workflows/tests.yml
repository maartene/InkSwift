name: Tests

on:
  push:
  pull_request:

# NOTE: test-macos and lint are TEMPORARILY disabled (if: false) while we bring
# up the new Linux runner (feature native-runtime-linux, US-04). RESTORE both by
# deleting their `if: ${{ false }}` lines before finalizing the feature.

jobs:
  test-macos:
    name: macOS
    if: ${{ false }}   # TEMP: disabled during Linux CI bring-up — restore for US-04 finalize
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v5
      - run: swift test

  # Linux parity gate (feature native-runtime-linux, US-04). Runs the same
  # `swift test` inside the official Swift 6.3.3 image — pinned to match the
  # macos-arm64 toolchain exactly, so any divergence is a real portability bug,
  # not a version gap. No inklecate and no JS engine are provisioned: the golden
  # oracle fixtures are committed, and JXKit (>=3.6.0) supplies its own Linux JS
  # backend for the InkSwift bridge target.
  test-linux:
    name: Linux
    runs-on: ubuntu-latest
    container: swift:6.3.3
    steps:
      # The swift image ships no Node, and this runner does not inject one into
      # container jobs, so JS actions (actions/checkout) cannot run. Clone with
      # plain git instead — no Node, no checkout-action Node-version matching.
      - name: Checkout (node-free)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory '*'
          server="${GITHUB_SERVER_URL:-https://git.embersescape.party}"
          url="${server}/${GITHUB_REPOSITORY}.git"
          if [ -n "${TOKEN}" ]; then
            auth="$(printf 'x-access-token:%s' "${TOKEN}" | base64 | tr -d '\n')"
            git -c http.extraheader="Authorization: Basic ${auth}" clone "${url}" .
          else
            git clone "${url}" .
          fi
          git checkout -q "${GITHUB_SHA}"
      # The InkSwift JS-bridge (JXKit) links JavaScriptCoreGTK on Linux. The bridge
      # stays supported on Linux for downstream consumers, so install its system
      # dependency here (auto-pulls libglib2.0-dev + gir bindings; pkg-config is
      # already in the image). The pure-Swift SwiftInkRuntime itself needs none of it.
      - name: Install JavaScriptCoreGTK (JXKit Linux backend)
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends libjavascriptcoregtk-4.1-dev
      - run: swift test

  lint:
    name: SwiftLint (architecture boundary rules)
    if: ${{ false }}   # TEMP: disabled during Linux CI bring-up — restore for US-04 finalize
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v5
      # SwiftLint may not be preinstalled on the runner; install it if absent.
      - name: Ensure SwiftLint is available
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version
      # Enforce only the architecture boundary custom_rules (R1/R3/R4/R5) from
      # .swiftlint.yml — not opinionated style rules. Passes on the current tree;
      # the R5 Compiler/ rules activate automatically as the compiler lands.
      - name: Enforce boundary rules (R1/R3/R4/R5)
        run: swiftlint lint --strict --no-cache --config .swiftlint.yml
