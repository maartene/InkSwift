name: Tests

on:
  push:
  pull_request:

jobs:
  test-macos:
    name: macOS
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v5
      - run: swift test

  # Linux parity gate (feature native-runtime-linux, US-04). Runs the same
  # `swift test` inside the official Swift 6.3.3 image — pinned to match the
  # macos-arm64 toolchain exactly, so any divergence is a real portability bug,
  # not a version gap. No inklecate and no JS engine are provisioned: the golden
  # oracle fixtures are committed, and JXKit (>=3.6.0) supplies its own Linux JS
  # backend for the InkSwift bridge target.
  test-linux:
    name: Linux
    runs-on: ubuntu-latest
    container: swift:6.3.3
    steps:
      - uses: actions/checkout@v5
      - run: swift test

  lint:
    name: SwiftLint (architecture boundary rules)
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v5
      # SwiftLint may not be preinstalled on the runner; install it if absent.
      - name: Ensure SwiftLint is available
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version
      # Enforce only the architecture boundary custom_rules (R1/R3/R4/R5) from
      # .swiftlint.yml — not opinionated style rules. Passes on the current tree;
      # the R5 Compiler/ rules activate automatically as the compiler lands.
      - name: Enforce boundary rules (R1/R3/R4/R5)
        run: swiftlint lint --strict --no-cache --config .swiftlint.yml
