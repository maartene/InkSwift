name: Tests

on:
  push:
  pull_request:

jobs:
  test-macos:
    name: macOS
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v4
      - run: swift test

  test-linux:
    name: Linux
    runs-on: macos-arm64
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Build and test in Linux container
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker run --rm \
            -v "$PWD:/build" \
            -v inkswift-linux-build:/build/.build \
            -w /build \
            swift:latest \
            bash -c "swift test --filter SwiftInkRuntimeTests"
