# Environments — native-ink-compiler (DEVOPS wave, DISTILL Mandate-4 consumer)
#
# This is a Swift Package Manager LIBRARY, not a deployed service. "Environments"
# here describe ORACLE AVAILABILITY and PLATFORM, not install-state or running
# infrastructure. There are no servers, containers, or runtime topology.
#
# Density: lean. Author: Apex (nw-platform-architect). Date: 2026-06-14.

feature: native-ink-compiler
artifact_kind: library-test-environments
deployment_model: spm-library-distribution   # no servers/containers; "release" = tag + version bump

environments:
  clean:
    description: >
      Fresh checkout with no oracle present. Builds the package and runs native
      compiler unit tests that need no oracle (parser/AST/codegen units, error
      reporting, unsupported-construct rejection). This is the portability floor.
    platform: [macos, linux]
    oracle: none
    runs:
      - swift build
      - native compiler unit tests (oracle-independent)
      - execution-equivalence KPI #1 (native compile vs committed inklecate .ink.json
        through the pure-Swift runtime — hermetic, no InkSwift import) [DISTILL UI-1]
      - unsupported-construct rejection corpus (US-06 / KPI #2)
      - doc-vs-compiler consistency (KPI #3) + no-inklecate guardrail (KPI #4)
    preconditions:
      - Swift toolchain >= 5.8 (raised from 5.6 when Compiler/ lands; DDD-11)
      - committed .ink.json fixtures present; no JXKit / InkSwift JS-bridge required
    notes: >
      [DISTILL UI-1, 2026-06-14] The PRIMARY KPI #1 gate runs here, cross-platform:
      the comparison is native-compile vs committed inklecate .ink.json and imports
      no InkSwift. The macOS JS-bridge is only a SECONDARY cross-check (see
      with-oracle-macos). Linux build + all four KPI gates run here.

  with-oracle-macos:
    description: >
      macOS (macos-arm64) with the InkSwift JS-bridge available. Runs everything
      `clean` runs PLUS the SECONDARY JS-bridge ground-truth cross-check for KPI #1.
      The Forgejo CI host.
    platform: [macos]
    oracle: inkswift-js-bridge (secondary cross-check)
    runs:
      - everything in `clean` (incl. the hermetic KPI #1 primary gate)
      - SECONDARY: InkSwift JS-bridge replay of committed fixtures as a Level-2
        ground-truth cross-check on the supported corpus
    preconditions:
      - InkSwift module builds (JXKit / JS-bridge present and resolvable)
      - committed .ink.json fixtures present (generated offline; see with-inklecate-local)
      - Swift toolchain >= 5.8
    notes: >
      [DISTILL UI-1] inklecate is NOT invoked here. The PRIMARY KPI #1 gate is the
      hermetic native-vs-fixture comparison (also runs on `clean`); the JS-bridge
      here is a secondary cross-check, no longer the sole measurement path.

  with-inklecate-local:
    description: >
      Local developer machine with inklecate present, used OFFLINE to (re)generate
      the committed .ink.json oracle fixtures from .ink sources. NOT a CI environment
      and NOT a runtime/production dependency. Gated behind a REGEN env flag so it
      never runs in normal CI.
    platform: [macos, linux]
    oracle: inklecate-offline-fixture-generation
    runs:
      - REGEN-gated regeneration of .ink.json fixtures from .ink corpus
    preconditions:
      - inklecate on PATH (e.g. /Users/Maarten.Engels/.local/bin/inklecate)
      - REGEN environment flag explicitly set
    notes: >
      inklecate is a TEST-ONLY, local/offline tool for fixture provenance. Its
      output (.ink.json) is committed to the repo; CI consumes the committed
      fixtures, never inklecate itself. Production Compiler/ code references no
      Process/inklecate (enforced by the no-inklecate guardrail, KPI #4).

coexistence_matrix:
  - concern: Existing Forgejo CI (.forgejo/workflows/tests.yml)
    requirement: must keep working (swift test on macos-arm64, push + pull_request)
    impact_of_feature: additive; the SwiftLint lint job is already LIVE and green (UI-2); the no-inklecate guard ships as a test in the suite; R5 rules are path-scoped to Compiler/ and activate as those files land
  - concern: Frozen InkSwift (JS-bridge) module + JXKit dependency
    requirement: untouched (D8); remains the macOS execution oracle
    impact_of_feature: none; compiler imports nothing from InkSwift; JXKit unchanged
  - concern: Existing 154-test runtime suite
    requirement: must stay green
    impact_of_feature: none; compiler additions are new files under Compiler/ and additive Facade/ inits; no change to the public StoryBlueprint(json:) path
  - concern: Public API surface
    requirement: StoryBlueprint(json:) path unchanged (D8, DDD-2)
    impact_of_feature: only an internal StoryBlueprint(root:) init + a new compile entry point are added

platform_coverage:
  supported_ci_target: macos        # macos-arm64 CI host (also runs the secondary JS-bridge cross-check)
  cross_platform: [macos, linux]    # [DISTILL UI-1] KPI #1-#4 are hermetic and run on `clean` (macOS + linux); KPI #1 no longer macOS-bound
  unsupported: []                   # no iOS/tvOS CI run (library builds for them, but the compiler is a build-time tool path)

deployment_assumptions:
  - Compiler additions must NOT change the public StoryBlueprint(json:) path.
  - The frozen InkSwift module and JXKit must not be modified (D8).
  - CI must remain green incrementally, per slice (S0..S6). [DISTILL UI-2] The
    SwiftLint lint job is already live and green; R5 rules are path-scoped to
    Compiler/ and activate as those files land. The no-inklecate guard is a test.
  - The R5/R1/R3 SwiftLint boundary gate must pass on every push/PR.
  - Compiler accepted set == runtime supported set (D1); over-acceptance is forbidden.
  - "Release" is a git tag + SPM version bump; rollback is reverting the tag. No
    rollout, canary, blue-green, or runtime telemetry applies (library, not service).
